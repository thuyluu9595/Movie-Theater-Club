server.port=8080

##Database configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_theater?sslmode=disable
#spring.datasource.url=jdbc:postgresql://movie-theater.crti8cccqylv.us-east-1.rds.amazonaws.com:5432/movie_theater?sslmode=disable

spring.datasource.username=root
spring.datasource.password=secret

##Pgvector
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.max-document-batch-size=10000

##JPA Config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.serialization.fail-on-empty-beans=false
# Show the SQL queries
spring.jpa.show-sql=false

# Format the SQL to be more readable
spring.jpa.properties.hibernate.format_sql=true

# Show the parameters being bound to the queries
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Disable Hibernate's second-level cache
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# Disable Hibernate's query cache
spring.jpa.properties.hibernate.cache.use_query_cache=false

## AWS S3 Config
aws.s3.bucket.name=movie-theater-s3
aws.s3.bucket.region=us-west-1

## Stripe
api.stripe.secret=${STRIPE_SECRET_KEY:}
api.stripe.publishable=${STRIPE_PUBLISHABLE_KEY:}
subscription.id=${STRIPE_SUBSCRIPTION_ID:}

server.ssl.enabled=false

## OpenAI API
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=o4-mini-2025-04-16
spring.ai.openai.chat.options.temperature=1
spring.ai.openai.embedding.options.model=text-embedding-3-small

## Flyway Config
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration


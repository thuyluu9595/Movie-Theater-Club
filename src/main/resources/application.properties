server.port=8080

##Database configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_theater?sslmode=disable
#spring.datasource.url=jdbc:postgresql://movie-theater.crti8cccqylv.us-east-1.rds.amazonaws.com:5432/movie_theater?sslmode=disable

spring.datasource.username=root
spring.datasource.password=secret
#spring.datasource.password=postgres123

##JPA Config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.serialization.fail-on-empty-beans=false

## AWS S3 Config
aws.s3.bucket.name=movie-theater-s3
aws.s3.bucket.region=us-west-1

## Stripe
api.stripe.secret=${STRIPE_SECRET_KEY:}
api.stripe.publishable=${STRIPE_PUBLISHABLE_KEY:}
subscription.id=${STRIPE_SUBSCRIPTION_ID:}

server.ssl.enabled=false

## OpenAI API
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=o4-mini-2025-04-16
spring.ai.openai.chat.options.temperature=0.7

## Flyway Config
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
